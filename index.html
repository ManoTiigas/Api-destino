<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recife Perigoso</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚠️</text></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background-color: #0d0d0d;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px;
    }

    /* faixa de alerta no topo */
    .alerta-topo {
      width: 100%;
      background: #c0392b;
      color: white;
      text-align: center;
      padding: 8px;
      font-size: 0.78rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 600;
      margin-bottom: 32px;
      position: fixed;
      top: 0;
      left: 0;
    }

    .conteudo {
      margin-top: 48px;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* cabeçalho */
    .cabecalho {
      text-align: center;
      margin-bottom: 32px;
    }

    .cabecalho h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3.5rem;
      line-height: 1;
      color: #c0392b;
      letter-spacing: 2px;
    }

    .cabecalho h1 span {
      color: #f0f0f0;
    }

    .cabecalho p {
      color: #888;
      font-size: 0.85rem;
      margin-top: 6px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* botão */
    button {
      width: 100%;
      padding: 16px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      letter-spacing: 3px;
      background: #c0392b;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin-bottom: 28px;
      transition: background .2s, transform .1s;
    }

    button:hover { background: #a93226; }
    button:active { transform: scale(.98); }

    /* card do resultado */
    #resultado {
      width: 100%;
    }

    .card {
      background: #1a1a1a;
      border-left: 4px solid #c0392b;
      border-radius: 4px;
      overflow: hidden;
      animation: aparecer .3s ease;
    }

    @keyframes aparecer {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card img {
      width: 100%;
      height: 260px;
      object-fit: cover;
      display: block;
      filter: grayscale(20%) contrast(1.1);
    }

    .card-info {
      padding: 20px;
    }

    .badge {
      display: inline-block;
      background: #c0392b;
      color: white;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 2px;
      margin-bottom: 10px;
    }

    .card-info h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 1px;
      color: #f0f0f0;
      margin-bottom: 4px;
    }

    .card-info p {
      color: #888;
      font-size: 0.85rem;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .loading {
      text-align: center;
      color: #555;
      font-size: 0.9rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 40px 0;
    }

    /* rodapé */
    footer {
      margin-top: 40px;
      color: #333;
      font-size: 0.75rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="alerta-topo">⚠ Atenção — Zonas de risco em Pernambuco</div>

  <div class="conteudo">

    <div class="cabecalho">
      <h1>RECIFE<span>PE</span></h1>
      <p>Zonas de risco — gire para descobrir</p>
    </div>

    <button onclick="girar()">⚠ GIRAR DESTINO</button>

    <div id="resultado"></div>

    <footer>Dados para fins educativos · Pernambuco, Brasil</footer>

  </div>

  <script>
    function girar() {
      document.getElementById('resultado').innerHTML = '<div class="loading">Carregando...</div>';

      fetch('/api/destino')
        .then(r => r.json())
        .then(dados => {
          document.getElementById('resultado').innerHTML = `
            <div class="card">
              <img src="${dados.imagem}" alt="${dados.nome}" />
              <div class="card-info">
                <span class="badge">Zona de risco</span>
                <h2>${dados.nome}</h2>
                <p>${dados.pais}</p>
              </div>
            </div>
          `;
        })
        .catch(() => {
          document.getElementById('resultado').innerHTML = '<div class="loading">Erro ao carregar. Tente novamente.</div>';
        });
    }
  </script>

</body>
</html>

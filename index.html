<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Destino do Dia</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f4f8;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px;
    }

    h1 {
      font-size: 2rem;
      color: #1a1a2e;
      margin-bottom: 24px;
    }

    button {
      padding: 12px 32px;
      font-size: 1rem;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 32px;
    }

    button:hover {
      background: #1d4ed8;
    }

    #resultado {
      width: 100%;
      max-width: 500px;
      text-align: center;
    }

    #resultado img {
      width: 100%;
      border-radius: 12px;
      margin-bottom: 16px;
    }

    #resultado h2 {
      font-size: 1.5rem;
      color: #1a1a2e;
      margin-bottom: 4px;
    }

    #resultado p {
      color: #6b7280;
      font-size: 1rem;
    }
  </style>
</head>
<body>

  <h1>🌍 Destino do Dia</h1>
  <button onclick="girar()">Girar</button>
  <div id="resultado"></div>

  <script>
    function girar() {
      document.getElementById('resultado').innerHTML = '<p>Carregando...</p>';

      fetch('/api/destino')
        .then(r => r.json())
        .then(dados => {
          document.getElementById('resultado').innerHTML = `
            <img src="${dados.imagem}" alt="${dados.nome}" />
            <h2>${dados.nome}</h2>
            <p>${dados.pais}</p>
          `;
        });
    }
  </script>

</body>
</html>
